# ============================================================
# Application configuration
# Python comparison: this is roughly like a config.py or .env file,
# but Spring Boot reads it automatically at startup — no manual
# os.environ / dotenv loading code required.
# ============================================================

spring.application.name=phishing-detector

# Port the embedded web server listens on (Flask's app.run(port=5000) equivalent)
server.port=8081

# Where the trained Weka model file will be loaded from at startup.
# We'll populate this in the Model Training module.
phishing.model.path=classpath:model/phishing-model.model

# Where the training dataset (equivalent of your phishing.csv) lives.
phishing.dataset.path=classpath:model/phishing.csv

# Basic logging so we can see what's happening during development.
logging.level.com.phishingdetector=DEBUG
